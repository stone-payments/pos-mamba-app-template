<AppBarModifier title="Payment" />

<div class="container">
  <Input
    ref:stonecodeInput
    autofocus
    label="DIGITE O STONECODE"
    maxlength="9"
    bind:value="stoneCode" />
</div>

<br>
<Button
  size="full"
  on:click="pay()"
  shortcut="enter"
  disabled={stoneCode.length < 9}
>
  PAGAR
</Button>
<br>
<br>
<Button
  size="full"
  on:click="activate()"
  shortcut="enter"
  disabled={stoneCode.length < 9}
>
  ATIVAR
</Button>

<script>
  import Payment from '@mamba/pos/api/payment.js';
  import System from '@mamba/pos/api/system.js';

  export default {
    components: {
      AppBarModifier: '@mamba/appbar/Modifier.html',
      Button: '@mamba/button',
      Input: '@mamba/input',
    },
    data() {
      return {
        stoneCode: '',
      };
    },
    methods: {
      pay() {
        const { stoneCode } = this.get();
        Payment.pay({
          amount: 100,
          stoneCode,
        })
          .then(() => console.log('chamoou'))
          .catch((error) => console.error(error));
      },
      activate() {
        const { stoneCode } = this.get();
        System.activateStonecode(stoneCode)
          .then(() => alert(`ATIVOU O ${stoneCode}`))
          .catch(() => alert(`NÃO ATIVOU ${stoneCode}`));
      },
    },
  };
</script>
