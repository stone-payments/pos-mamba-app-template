<AppBarModifier title="Payment" />

<div class="container">
  <p>Pagamento com o Stonecode:</p>
  <h2>{stonecode}</h2>
</div>


<Button
  size="full"
  bottom
  on:click="pay()"
  shortcut="enter"
>
  PAGAR
</Button>

<script>
  import Payment from '@mamba/pos/api/payment.js';

  export default {
    components: {
      AppBarModifier: '@mamba/appbar/Modifier.html',
      Button: '@mamba/button',
    },
    data() {
      return {
        stonecode: '',
      };
    },
    oncreate() {
      const stonecode = __PROD__ ? '155559399' : '45102043';
      this.set({ stonecode });
    },
    methods: {
      pay() {
        const { stonecode } = this.get();
        Payment.pay({
          amount: 100,
          stonecode,
        })
          .then(() => console.log('chamoou'))
          .catch((error) => console.error(error));
      },
    },
  };
</script>
